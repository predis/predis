name: spellcheck
on:
  pull_request:
jobs:
  check-spelling:
    permissions:
      contents: read
      checks: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Check Spelling
        uses: rojopolis/spellcheck-github-actions@0.60.0
        with:
          config_path: .github/spellcheck-settings.yml
          task_name: Markdown
